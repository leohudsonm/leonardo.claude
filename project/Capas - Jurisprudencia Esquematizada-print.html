<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Capas A4 · Jurisprudência Esquematizada · Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0; background: #333;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  /* Wrapper representa uma página A4 (210mm x 297mm).
     Dentro, o .cover é 1240x1754px e é escalado para caber. */
  .page {
    width: 210mm; height: 297mm;
    margin: 10mm auto;
    background: #fff;
    overflow: hidden; position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    break-after: page;
    page-break-after: always;
  }
  .page:last-child { break-after: auto; page-break-after: auto; }
  .cover {
    width: 1240px; height: 1754px;
    transform-origin: top left;
    /* 210mm = 793.7px @96dpi; 1240 / 793.7 ≈ 1.5623 → scale 0.6401 */
    transform: scale(0.6401);
  }
  @page {
    size: A4 portrait;
    margin: 0;
  }
  @media print {
    html, body { background: #fff; }
    .page {
      margin: 0;
      box-shadow: none;
      width: 210mm; height: 297mm;
    }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="covers.jsx"></script>
<script type="text/babel">
  const DISCIPLINA = 'Direito Constitucional';
  const ANO = '2026';

  const variations = [
    { id: 'v1', Component: CoverClassica },
  ];

  function PrintSheet() {
    return (
      <>
        {variations.map(v => (
          <div key={v.id} className="page">
            <div className="cover">
              <v.Component disciplina={DISCIPLINA} ano={ANO} />
            </div>
          </div>
        ))}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<PrintSheet />);

  (async () => {
    try { await document.fonts.ready; } catch {}
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>
